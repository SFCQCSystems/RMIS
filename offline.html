<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ออฟไลน์ - ระบบแจ้งตรวจสอบคุณภาพ</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #333;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #0f172a;
    }
    p {
      color: #64748b;
      margin-bottom: 30px;
    }
    button {
      background-color: #0284c7;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #0369a1;
    }
  </style>
</head>
<body>
  <div class="icon">📶❌</div>
  <h1>ไม่สามารถเชื่อมต่ออินเทอร์เน็ตได้</h1>
  <p>กรุณาตรวจสอบการเชื่อมต่อเครือข่ายของคุณ</p>
  <button onclick="window.location.reload()">ลองใหม่</button>
</body>
</html>
